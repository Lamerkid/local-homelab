apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-nodeport
spec:
  type: NodePort
  selector:
    app: {{ .Chart.Name }}
  ports:
    - port: {{ .Values.service.port }}
      protocol: TCP
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}
